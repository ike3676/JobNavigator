services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobnavigator
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobnavigator
    volumes:
      - jobnav_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobnavigator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobnav_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://jobnavigator:password@db:5432/jobnavigator
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./backups:/app/backups
      - ./backend/.linkedin_api:/root/.linkedin_api
    networks:
      - jobnav_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jobnav_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "6790:80"
      - "6795:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - jobnav_net
      - npm_net
networks:
  npm_net:
    name: npm_net
    external: true
  jobnav_net:
    name: jobnav_net
volumes:
  jobnav_pgdata:
  caddy_data:
  caddy_config:
